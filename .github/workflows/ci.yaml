name: CI/CD Security & Build Pipeline

on:
  push:
    branches: [ "main", "develop" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main", "develop" ]

# Cancel any in-progress runs if you push new code to the same branch quickly
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Sets the registry to GitHub Container Registry
  REGISTRY: ghcr.io
  # Converts your GitHub username to lowercase for the image tag
  IMAGE_NAME: ${{ github.repository_owner }}/video-transcriber

jobs:
  codeql-scan:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [ 'python', 'javascript' ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  build-scan-push:
    name: Build, Trivy Scan, and Push
    needs: codeql-scan # Only runs if the code is secure!
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to push to GHCR
    strategy:
      fail-fast: false
      # This matrix runs 3 parallel jobs at the exact same time!
      matrix:
        service: [api, worker, frontend]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/${{ matrix.service }}/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # THE MAGIC SPEED BOOST: GitHub Actions native Docker caching
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Push Image Tags
        run: docker push --all-tags ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}
  update-gitops:
    name: Update GitOps Repository
    # This ensures it only runs AFTER your Docker image is successfully pushed
    needs: build-scan-push 
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') 
    steps:
      - name: Checkout GitOps Repository
        uses: actions/checkout@v3
        with:
          repository: kkarka/transcriber-gitops 
          token: ${{ secrets.GITOPS_PAT }} 

      - name: Update Image Tag in values-dev.yaml
        run: |
          # 1. Strip the 'v' from your GitHub tag (e.g., turns 'v1.0.6' into '1.0.6')
          VERSION=${GITHUB_REF_NAME#v}
          
          # 2. Use precise sed to find the 'image:' block and replace the 'tag:' line below it
          sed -i "/image:/,/tag:/ s/tag: .*/tag: \"$VERSION\"/" kubernetes/helm/transcriber/values-dev.yaml
          
          # 3. Commit and push the changes back to GitHub
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add kubernetes/helm/transcriber/values-dev.yaml
          git commit -m "chore: auto-update image tag to $VERSION [skip ci]"
          git push