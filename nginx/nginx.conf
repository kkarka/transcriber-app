events {
    worker_connections 1024;
}

http {
    server_tokens off; 
    gzip on;
    gzip_types text/plain application/json;
    gzip_min_length 1000; 

    resolver 127.0.0.11 valid=30s;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

    server {
        listen 80;
        server_name localhost;

        # 1. Direct Static File Serving (NEW)
        # Bypasses the application layers completely for massive performance gains
        location /uploads/ {
            alias /www/uploads/;
            
            # Optional: Tell browsers to cache these files
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # 2. Route API requests to FastAPI
        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;
            
            # Note: The trailing slash strips '/api/'. Remove it if FastAPI needs the prefix.
            proxy_pass http://api:8000/;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Critical for accepting large video files
            client_max_body_size 500M;
        }
        
        # 3. Route everything else to the React Frontend
        location / {
            set $upstream_frontend frontend;
            proxy_pass http://$upstream_frontend:8080;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}